<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f6efdd">
  <title>할머니를 위한 시집</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

  <!-- ① 시작 화면 -->
  <section id="screen-start" class="screen active">
    <h1 class="app-title">할머니를 위한<br>시집</h1>
    <button id="btn-start" class="btn btn-big">시작</button>
  </section>

  <!-- ② 시집 목록 화면 -->
  <section id="screen-list" class="screen">
    <h2 class="screen-title">시집 목록</h2>
    <div id="poem-list" class="poem-list">
      <!-- 시집 항목이 여기에 표시됨 -->
    </div>
    <button id="btn-new" class="btn btn-big">새로 만들기</button>
  </section>

  <!-- ③ 시 만드는 페이지 -->
  <section id="screen-editor" class="screen">
    <div id="line-viewport" class="line-viewport">
      <div class="line-row" id="line-prev"><span class="line-label"></span><span class="line-text"></span></div>
      <div class="line-row current" id="line-cur"><span class="line-label"></span><span class="line-text"></span></div>
      <div class="line-row" id="line-next"><span class="line-label"></span><span class="line-text"></span></div>
    </div>
    <div id="rec-status" class="rec-status"></div>
    <div class="btn-grid">
      <button id="btn-speak" class="btn">말하기</button>
      <button id="btn-speak-stop" class="btn" disabled>말하기 종료</button>
      <button id="btn-line-prev" class="btn">이전 줄</button>
      <button id="btn-line-next" class="btn">다음 줄</button>
      <button id="btn-erase" class="btn">지우기</button>
      <button id="btn-preview" class="btn">미리보기</button>
    </div>
  </section>

  <!-- ④ 미리보기 페이지 -->
  <section id="screen-preview" class="screen">
    <div id="preview-paper" class="preview-paper">
      <div id="preview-title" class="preview-title"></div>
      <div id="preview-name" class="preview-name"></div>
      <div id="preview-body" class="preview-body"></div>
    </div>
    <div class="btn-grid">
      <button id="btn-back" class="btn">이전으로</button>
      <button id="btn-to-list" class="btn">시 목록으로</button>
      <button id="btn-read" class="btn">전체 낭독</button>
      <button id="btn-done" class="btn btn-primary">완료<br><small>(메일 보내기)</small></button>
    </div>
  </section>

  <!-- 시 삭제 확인 창 -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="overlay-box">
      <p class="overlay-text">이 시를<br>지울까요?</p>
      <button id="btn-del-yes" class="btn btn-danger">지우기</button>
      <button id="btn-del-no" class="btn">안 지우기</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
